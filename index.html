<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>包装刀版生成器</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>包装刀版生成器</h1>
      <p>当前阶段为界面外壳整理阶段，盒型规则、命名逻辑和公式后续重建。</p>

      <div class="field">
        <label for="boxType">盒型</label>
        <select id="boxType">
          <option value="regular-carton">对口纸箱</option>
          <option value="reverse-insert-lock">反向插锁盒</option>
        </select>
      </div>
      
      <div class="field">
        <label for="length">长度 L (mm)</label>
        <input id="length" type="number" value="180" />
      </div>

      <div class="field">
        <label for="width">宽度 W (mm)</label>
        <input id="width" type="number" value="80" />
      </div>

      <div class="field">
        <label for="height">高度 H (mm)</label>
        <input id="height" type="number" value="45" />
      </div>

      <div class="field">
        <label for="material">材质</label>
        <select id="material">
          <option value="">-- 请选择材料 --</option>
        </select>
      </div>

      <div class="field">
        <label for="thickness">厚度</label>
        <select id="thickness">
          <option value="">-- 请先选择材料 --</option>
        </select>
      </div>

      <div class="stats">
        <div class="stat">
          间隙 Gap
          <strong id="gapVal">待定义</strong>
        </div>
        <div class="stat">
          糊口 Glue Flap
          <strong id="glueVal">待定义</strong>
        </div>
        <div class="stat">
          翻盖高度
          <strong id="flipVal">待定义</strong>
        </div>
        <div class="stat">
          斜边补偿
          <strong id="glueHeightVal">待定义</strong>
        </div>
        <div class="stat">
          厚度行业标准允许误差范围
          <strong id="toleranceVal">待配置</strong>
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="downloadBtn">导出 SVG</button>
        <button class="secondary" id="downloadPdfBtn">导出 PDF</button>
        <button class="secondary" id="resetBtn">重置</button>
      </div>

      <div class="tips">
        当前版本仅保留界面外壳与基础输入区域。<br />
        下方参数暂为预留显示字段，后续按新命名规则和新公式接入。
      </div>

      <div class="code-note">
        当前界面分三栏：<br />
        1. 左侧：输入参数 + 预留显示字段<br />
        2. 中间：刀版平面图区域<br />
        3. 右侧：3D 预览区域
      </div>
    </div>

    <div class="panel">
      <h2>刀版平面图</h2>
      <p>当前为占位预览区，后续接入新的盒型逻辑。</p>
      <div class="preview">
        <svg id="previewSvg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>

    <div class="panel view-3d-panel">
      <h2>3D 斜侧示意</h2>
      <p>当前为占位预览区，后续接入新的结构逻辑。</p>
      <div class="preview">
        <svg id="isoSvg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>
  </div>
  <script src="./data/material-config.js"></script>
  <script src="./data/geometry/common/math.js"></script>
  <script src="./data/geometry/common/result-builder.js"></script>
  
  <script src="./data/geometry/box-types/regular-carton/meta.js"></script>
  <script src="./data/geometry/box-types/regular-carton/formulas.js"></script>
  <script src="./data/geometry/box-types/regular-carton/builder.js"></script>
  
  <script src="./data/geometry/box-types/reverse-insert-lock/meta.js"></script>
  <script src="./data/geometry/box-types/reverse-insert-lock/formulas.js"></script>
  <script src="./data/geometry/box-types/reverse-insert-lock/builder.js"></script>
  
  <script src="./data/geometry/index.js"></script>
  
  <script src="./render.js"></script>
  <script src="./export.js"></script>
  <script src="./app.js"></script>
  
</body>
</html>
